services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - QWEN_API_URL=https://openrouter.ai/api/v1/chat/completions
      - QWEN_MODEL=qwen/qwen-2.5-72b-instruct
      - DATABASE_PATH=/app/data/flashcards.db
      - CORS_ORIGINS=["http://10.93.26.6:8000","http://localhost:8000"]
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    restart: unless-stopped
