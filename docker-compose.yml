services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/flashcards.db
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
